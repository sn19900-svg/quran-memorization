name: Build & Release APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks
          echo "Keystore size: $(wc -c < app/release.jks) bytes"

      - name: Verify keystore
        run: |
          keytool -list -keystore app/release.jks \
            -storepass "${{ secrets.STORE_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}"

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/app/release.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: quran-memorization-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Clean up keystore
        if: always()
        run: rm -f app/release.jks
