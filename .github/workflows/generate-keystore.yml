name: Generate New Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.jks \
            -alias quran_key \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass "QuranApp2026!" \
            -keypass "QuranApp2026!" \
            -dname "CN=Quran,O=sn19900,C=SA"
          echo "KEYSTORE_BASE64=$(base64 -w 0 release.jks)" >> $GITHUB_OUTPUT
          base64 -w 0 release.jks > keystore_b64.txt

      - uses: actions/upload-artifact@v4
        with:
          name: new-keystore
          path: keystore_b64.txt
          retention-days: 1
