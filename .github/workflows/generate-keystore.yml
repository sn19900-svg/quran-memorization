name: Generate Keystore (one-time)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.jks \
            -alias quran_key \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass "QuranApp2026!" \
            -keypass "QuranApp2026!" \
            -dname "CN=Quran Memorization, OU=Personal, O=sn19900, L=Unknown, ST=Unknown, C=SA"
          base64 -w 0 release.jks > keystore_base64.txt

      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystore-files
          path: |
            release.jks
            keystore_base64.txt
          retention-days: 1
